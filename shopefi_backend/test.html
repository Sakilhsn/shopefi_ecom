</head>
<body>

<h2>Test Razorpay Payment</h2>
<button id="pay-btn">Pay ₹4.99</button>

<script>
var options = {
  key: "rzp_test_SlLkKLlxRUYHSp",
  amount: 499,
  currency: "INR",
  name: "Shopefi",
  description: "Test Payment",
  order_id: "order_SlclFvdTjNnIww",

  config: {
    display: {
      blocks: {

          ]
